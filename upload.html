<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Foto — FotoBlog de Jose</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">Foto<span>Blog</span></a>
            <p class="tagline">Cada foto cuenta una historia del pasado</p>
            <nav class="nav-links">
                <a href="/" class="nav-link">🏠 Inicio</a>
                <a href="/roll.html" class="nav-link">🎞️ Rollos</a>
                <a href="/upload.html" class="nav-link">📤 Subir</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="upload-container">
            <h1 class="upload-title">Nueva Exposición</h1>
            <p class="upload-subtitle">Añade una foto a tu colección analógica</p>

            <form class="upload-form" id="uploadForm">
                <div class="form-group">
                    <label>Negativo / Foto</label>
                    <div class="file-drop" id="dropZone">
                        <div class="icon">📷</div>
                        <p>Arrastra una foto aquí o haz click para seleccionar</p>
                        <input type="file" id="fileInput" accept="image/*" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="title">Título</label>
                    <input type="text" id="title" placeholder="Nombre de la exposición">
                </div>

                <div class="form-group">
                    <label for="roll-id">ID del Roll</label>
                    <input type="text" id="roll-id" placeholder="001">
                </div>

                <div class="form-group">
                    <label for="day-number">Day #</label>
                    <input type="text" id="day-number" placeholder="001">
                </div>

                <div class="form-group">
                    <label for="photo-number">Foto #</label>
                    <input type="text" id="photo-number" placeholder="01">
                </div>

                <div class="form-group">
                    <label for="notes">Notas</label>
                    <textarea id="notes" placeholder="Notas sobre esta exposición..."></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">Revelar y Subir</button>
                <div id="uploadResult"></div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-seal">
            <span>FotoBlog<br>Jose · 2026</span>
        </div>
        <p class="footer-copyright">Cada foto cuenta una historia del pasado</p>
    </footer>

    <script>
        const CLOUD_NAME = 'dk3t3fas3';
        const DROPZONE = document.getElementById('dropZone');
        const FILE_INPUT = document.getElementById('fileInput');
        const FORM = document.getElementById('uploadForm');
        const SUBMIT_BTN = document.getElementById('submitBtn');
        const RESULT = document.getElementById('uploadResult');

        let currentMetadata = {};

        DROPZONE.onclick = () => FILE_INPUT.click();

        DROPZONE.ondragover = (e) => { e.preventDefault(); DROPZONE.style.borderColor = 'var(--sepia)'; };
        DROPZONE.ondragleave = () => { DROPZONE.style.borderColor = ''; };
        DROPZONE.ondrop = (e) => {
            e.preventDefault();
            DROPZONE.style.borderColor = '';
            if (e.dataTransfer.files.length) {
                FILE_INPUT.files = e.dataTransfer.files;
                autoFillFromFile(e.dataTransfer.files[0]);
            }
        };

        FILE_INPUT.onchange = () => {
            if (FILE_INPUT.files.length) autoFillFromFile(FILE_INPUT.files[0]);
        };

        function autoFillFromFile(file) {
            if (!file.type.startsWith('image/')) return;
            const name = file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
            document.getElementById('title').value = name;

            // Try EXIF
            if (typeof EXIF !== 'undefined') {
                EXIF.getData(file, function() {
                    try {
                        const dateTime = EXIF.getTag(this, 'DateTimeOriginal') || EXIF.getTag(this, 'DateTime');
                        if (dateTime) {
                            // Parse EXIF date to day number (simplified)
                            const dayMatch = String(dateTime).match(/(\d{4}):(\d{2}):(\d{2})/);
                            if (dayMatch) {
                                document.getElementById('day-number').value = `${dayMatch[2]}${dayMatch[3]}`;
                            }
                        }
                    } catch(e) {}
                });
            }
        }

        FORM.onsubmit = async (e) => {
            e.preventDefault();
            if (!FILE_INPUT.files.length) {
                alert('Selecciona una foto primero');
                return;
            }

            const file = FILE_INPUT.files[0];
            SUBMIT_BTN.disabled = true;
            SUBMIT_BTN.textContent = 'Revelando...';
            RESULT.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'fotoblog_unsigned');
            formData.append('folder', 'fotoblog');

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                // Build entry JSON
                const title = document.getElementById('title').value || 'Sin título';
                const rollId = document.getElementById('roll-id').value || '001';
                const dayNumber = document.getElementById('day-number').value || '001';
                const photoNumber = document.getElementById('photo-number').value || '01';
                const notes = document.getElementById('notes').value || '';

                const entry = {
                    id: `${rollId}-${photoNumber}`,
                    filename: data.secure_url,
                    title: title,
                    notes: notes,
                    day_number: dayNumber,
                    photo_number: photoNumber
                };

                const jsonSnippet = JSON.stringify(entry, null, 2);

                RESULT.innerHTML = `
                    <div class="result success">
                        <strong>✅ ¡Negativo subido a Cloudinary!</strong><br><br>
                        <strong>📋 Copia este JSON y añádelo al rollo en data/rolls.json:</strong>
                        <div class="json-snippet">${escapeHtml(jsonSnippet)}</div>
                        <button type="button" class="copy-btn" onclick="copyToClipboard(this, ${JSON.stringify(jsonSnippet).replace(/"/g, '&quot;')})">Copiar al portapapeles</button>
                    </div>
                `;
                RESULT.style.display = 'block';

                FORM.reset();

            } catch (err) {
                RESULT.innerHTML = `
                    <div class="result error">
                        <strong>❌ Error:</strong> ${err.message}
                    </div>
                `;
                RESULT.style.display = 'block';
            }

            SUBMIT_BTN.disabled = false;
            SUBMIT_BTN.textContent = 'Revelar y Subir';
        };

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '¡Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copiar al portapapeles';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '¡Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copiar al portapapeles';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
