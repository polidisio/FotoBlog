<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FotoBlog de Jose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-tertiary: #999999;
            --accent: #c9302c;
            --accent-hover: #a82525;
            --border: #e5e4e2;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
            display: inline-block;
        }

        .nav-link:hover {
            color: var(--accent);
            background: rgba(201, 48, 44, 0.1);
        }

        main { max-width: 1400px; margin: 0 auto; padding: 0 2rem 3rem; }

        /* Hero */
        .hero {
            margin-bottom: 3rem;
            padding: 2rem 0;
        }

        .hero-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .hero img {
            width: 100%;
            max-height: 70vh;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .hero img:hover { transform: scale(1.01); }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .hero-meta {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hero-excerpt {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 700px;
            white-space: pre-line;
        }

        /* Gallery Section */
        .gallery-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }

        .gallery-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .gallery-header .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Masonry Grid */
        .masonry-grid {
            column-count: 3;
            column-gap: 1.5rem;
        }

        @media (max-width: 900px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 600px) { .masonry-grid { column-count: 1; } }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            display: block;
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 3rem 1rem 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .photo-card:hover .photo-overlay { opacity: 1; }

        .photo-overlay .category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .photo-overlay h3 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .photo-overlay .date {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }

        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active { display: flex; }

        .modal-content {
            max-width: 1000px;
            background: var(--bg-primary);
            border-radius: 8px;
            overflow: hidden;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            background: #000;
        }

        .modal-info { padding: 2rem; }

        .modal-info .category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .modal-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .modal-info .date {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 1rem;
        }

        .modal-info p {
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-line;
        }

        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
        }

        @media (max-width: 768px) {
            .header-inner { padding: 0 1rem; }
            main { padding: 0 1rem 2rem; }
            .hero h2 { font-size: 1.75rem; }
        }

        .btn {
            background: #c9302c;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:hover { background: #a82525; }

    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/index.html" class="logo">Foto<span>Blog</span></a>
            <nav>
                <a href="/gallery.html" class="nav-link">📷 Galería</a>
            </nav>
        </div>
    </header>

    <main id="content">
        <div class="empty-state">
            <div class="icon">📷</div>
            <h2>Cargando...</h2>
        </div>
    </main>

    <footer>
        <p>© 2026 FotoBlog de Jose</p>
    </footer>

    <script>
        var photos = [];

        async function loadPhotos() {
            try {
                console.log('Loading photos...');
                const res = await fetch('./data/photos.json');
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                console.log('Photos loaded:', data.photos);
                photos = data.photos || [];
                renderPhotos();
            } catch (e) {
                console.error('Error loading photos:', e);
                document.getElementById('content').innerHTML = '<div style="padding:2rem;text-align:center;color:red;">Error: ' + e + '</div>';
            }
        }

        function renderPhotos() {
            const main = document.getElementById('content');
            
            if (!photos.length) {
                main.innerHTML = '<div class="empty-state"><div class="icon">📷</div><h2>No hay fotos todavía</h2></div>';
                return;
            }

            let html = '';
            
            // Hero (first photo)
            const hero = photos[0];
            html += '<section class="hero">';
            html += '<div class="hero-label">Featured</div>';
            html += '<img src="' + hero.filename + '" alt="' + hero.title + '" onclick="openModal(0)">';
            html += '<h2>' + hero.title + '</h2>';
            html += '<div class="hero-meta">' + (hero.category || '') + ' · ' + formatDate(hero.date_added) + '</div>';
            if (hero.comment) html += '<p class="hero-excerpt">' + hero.comment + '</p>';
            html += '</section>';

            // Gallery grid with ALL photos
            html += '<div class="gallery-header"><h2>Galería</h2><div class="line"></div></div>';
            html += '<div class="masonry-grid">';
            
            for (var i = 1; i < photos.length; i++) {
                var photo = photos[i];
                html += '<div class="photo-card" onclick="openModal(' + i + ')" style="animation-delay: ' + (i * 0.1) + 's">';
                html += '<img src="' + photo.filename + '" alt="' + photo.title + '">';
                html += '<div class="photo-overlay">';
                html += '<div class="category">' + (photo.category || 'Sin categoría') + '</div>';
                html += '<h3>' + photo.title + '</h3>';
                html += '<div class="date">' + formatDate(photo.date_added) + '</div>';
                if (photo.comment) html += '<p class="photo-comment">' + photo.comment.replace(/\n/g, '<br>') + '</p>';
                html += '</div></div>';
            }
            
            html += '</div>';
            
            main.innerHTML = html;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var date = new Date(dateStr);
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function openModal(index) {
            var photo = photos[index];
            var modal = document.createElement('div');
            modal.className = 'modal active';
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
            
            var html = '<button class="modal-close" onclick="this.parentElement.remove()">×</button>';
            html += '<div class="modal-content">';
            html += '<img src="' + photo.filename + '" alt="' + photo.title + '">';
            html += '<div class="modal-info">';
            html += '<div class="category">' + (photo.category || 'Sin categoría') + '</div>';
            html += '<h2>' + photo.title + '</h2>';
            html += '<div class="date">' + formatDate(photo.date_added) + '</div>';
            if (photo.comment) html += '<p>' + photo.comment + '</p>';
            html += '</div></div>';
            
            modal.innerHTML = html;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var modal = document.querySelector('.modal');
                if (modal) modal.remove();
            }
        });

        loadPhotos();
    </script>
</body>
</html>
